<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Rathna Foods</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
body{
margin:0;
font-family:'Poppins',sans-serif;
background:#fff;
color:#222;
}

/* HEADER */
header{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 20px;
background:white;
border-bottom:1px solid #eee;
position:sticky;
top:0;
z-index:100;
}

.logo{
font-size:20px;
font-weight:700;
color:#8b0000;
}

/* HERO */
.hero{
height:70vh;
background:url('images/bg.jpg') center/cover no-repeat;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
color:white;
}
.hero h1{
font-size:40px;
margin:0;
}
.hero p{
margin-top:10px;
font-weight:300;
}

/* SECTION */
.section{
padding:40px 20px;
max-width:1200px;
margin:auto;
}

/* TITLE */
.section h2{
text-align:center;
margin-bottom:30px;
}

/* GRID */
.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:25px;
}

/* CARD */
.card{
border-radius:12px;
overflow:hidden;
background:white;
transition:0.3s;
}
.card:hover{
transform:translateY(-5px);
box-shadow:0 10px 25px rgba(0,0,0,0.1);
}

.card img{
width:100%;
height:200px;
object-fit:cover;
}

.card-body{
padding:15px;
text-align:center;
}

.price{
color:#8b0000;
font-weight:600;
}

/* BUTTON */
button{
background:#8b0000;
color:white;
border:none;
padding:10px;
width:100%;
border-radius:6px;
margin-top:8px;
cursor:pointer;
}

/* FEATURES */
.features{
display:flex;
flex-wrap:wrap;
justify-content:space-around;
text-align:center;
padding:30px;
background:#fafafa;
}
.feature{
width:200px;
margin:10px;
}
.feature h4{
margin:10px 0 5px;
}

/* CART BAR */
.cart{
position:fixed;
bottom:0;
width:100%;
background:#000;
color:white;
text-align:center;
padding:12px;
}

/* FOOTER */
footer{
background:#111;
color:white;
text-align:center;
padding:20px;
margin-top:40px;
}
</style>
</head>

<body>

<header>
<div class="logo">Rathna Foods</div>
</header>

<!-- HERO -->
<div class="hero">
<div>
<h1>Fresh Homemade Masalas</h1>
<p>Authentic Taste • Pure Ingredients</p>
</div>
</div>

<!-- FEATURES -->
<div class="features">
<div class="feature">
<h4>🌿 100% Homemade</h4>
<p>Made with love</p>
</div>
<div class="feature">
<h4>🔥 Freshly Prepared</h4>
<p>Small batches</p>
</div>
<div class="feature">
<h4>🍃 Pure Ingredients</h4>
<p>No preservatives</p>
</div>
<div class="feature">
<h4>🚚 Delivered Fresh</h4>
<p>To your doorstep</p>
</div>
</div>

<!-- PRODUCTS -->
<div class="section">
<h2>Our Products</h2>
<div class="grid" id="products"></div>
</div>

<!-- CART -->
<div class="cart" onclick="checkout()">
🛒 <span id="count">0</span> | ₹<span id="total">0</span>
</div>

<footer>
<p>Free Delivery above ₹899 | Min Order ₹499</p>
<p>📞 8147924442</p>
</footer>

<script>
let products=[
["Puliyogare Powder",640,"images/puliyogare.jpg"],
["Sambar Powder",640,"images/sambar.jpg"],
["Rasam Powder",660,"images/rasam.jpg"],
["Vangibath Powder",740,"images/vangibath.jpg"],
["Bisi Bele Bath Powder",740,"images/bisibele.jpg"],
["Chicken Masala",680,"images/chicken.jpg"],
["Biriyani Powder",660,"images/biriyani.jpg"],
["Garam Masala",700,"images/garam.jpg"],
["Kebab Powder",500,"images/kebab.jpg"],
["Gulkand",450,"images/gulkand.jpg"],
["Dry Fruits Gulkand",700,"images/drygulkand.jpg"]
];

let cart=[];

function calc(b,s){
if(s=="100g")return b/10;
if(s=="200g")return b/5;
if(s=="500g")return b/2;
return b;
}

function load(){
let html="";
products.forEach((p,i)=>{
html+=`
<div class="card">
<img src="${p[2]}" onerror="this.src='images/default.jpg'">
<div class="card-body">
<h3>${p[0]}</h3>
<p class="price">₹${p[1]}/kg</p>

<select id="s${i}">
<option>100g</option>
<option>200g</option>
<option>500g</option>
<option>1kg</option>
</select>

<input id="q${i}" type="number" value="1">

<button onclick="add(${i})">Add to Cart</button>
</div>
</div>`;
});
document.getElementById("products").innerHTML=html;
}

function add(i){
let size=document.getElementById("s"+i).value;
let qty=parseInt(document.getElementById("q"+i).value);
let price=calc(products[i][1],size)*qty;

cart.push({name:products[i][0],size,qty,price});
update();
}

function update(){
let total=0;
cart.forEach(c=>total+=c.price);
document.getElementById("count").innerText=cart.length;
document.getElementById("total").innerText=total;
}

function checkout(){
let total=0,msg="🛒 Rathna Foods Order:%0A";

cart.forEach(c=>{
total+=c.price;
msg+=`${c.name} (${c.size}) x${c.qty} - ₹${c.price}%0A`;
});

if(total<499){alert("Minimum ₹499");return;}

let delivery=total>=899?0:80;
let final=total+delivery;

msg+=`Total: ₹${final}`;

window.open("https://wa.me/918147924442?text="+msg);
}

load();
</script>

</body>
</html>
