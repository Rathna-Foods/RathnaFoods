<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Rathna Foods</title>

<!-- Razorpay -->
<script src="https://checkout.razorpay.com/v1/checkout.js"></script>

<style>
body{margin:0;font-family:Poppins;background:#fff;color:#222}

header{
display:flex;justify-content:space-between;
padding:15px;border-bottom:1px solid #eee;
}

.hero{
height:50vh;
background:url('images/bg.jpg') center/cover;
display:flex;align-items:center;justify-content:center;
color:white;text-align:center;
}

.section{padding:20px}

input,select{
width:100%;
padding:10px;
margin-top:10px;
border-radius:6px;
border:1px solid #ccc;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:15px;
}

.card{
background:white;
box-shadow:0 5px 15px rgba(0,0,0,.1);
border-radius:10px;
overflow:hidden;
}

.card img{
width:100%;
height:150px;
object-fit:cover;
}

.card-body{text-align:center;padding:10px}

button{
background:#8b0000;color:white;border:none;
padding:10px;width:100%;border-radius:6px;margin-top:5px;
cursor:pointer;
}

.cart{
position:fixed;bottom:0;width:100%;
background:black;color:white;text-align:center;padding:10px;
}

.goto{
position:fixed;
bottom:60px;
right:15px;
background:#e67e22;
color:white;
padding:10px 15px;
border-radius:30px;
cursor:pointer;
display:none;
}
</style>
</head>

<body>

<header>
<h2>Rathna Foods</h2>
</header>

<div class="hero">
<h1>Fresh Homemade Masalas</h1>
</div>

<div class="section">

<h3>Customer Details</h3>
<input id="name" placeholder="Name">
<input id="phone" placeholder="Phone">
<input id="address" placeholder="Address">

<div class="grid" id="products"></div>

</div>

<div class="goto" id="gotoCart" onclick="scrollCart()">Go to Cart</div>

<div class="cart" onclick="checkout()">
🛒 <span id="count">0</span> | ₹<span id="total">0</span>
</div>

<script>

let products=[
["Puliyogare Powder",640,"images/puliyogare.jpg"],
["Sambar Powder",640,"images/sambar.jpg"],
["Rasam Powder",660,"images/rasam.jpg"]
];

let cart=[];

function calc(b,s){
if(s=="100g") return b/10;
if(s=="200g") return b/5;
if(s=="500g") return b/2;
return b;
}

function loadProducts(){
let html="";
for(let i=0;i<products.length;i++){
html+=`
<div class="card">
<img src="${products[i][2]}" onerror="this.src='images/default.jpg'">
<div class="card-body">
<h4>${products[i][0]}</h4>
<p>₹${products[i][1]}/kg</p>

<select id="size${i}">
<option>100g</option>
<option>200g</option>
<option>500g</option>
<option>1kg</option>
</select>

<input id="qty${i}" type="number" value="1" min="1">

<button onclick="addToCart(${i})">Add to Cart</button>
</div>
</div>`;
}
document.getElementById("products").innerHTML=html;
}

function addToCart(i){
let size=document.getElementById("size"+i).value;
let qty=parseInt(document.getElementById("qty"+i).value);

if(!qty || qty<=0){
alert("Enter valid quantity");
return;
}

let price=calc(products[i][1],size)*qty;

cart.push({
name:products[i][0],
size:size,
qty:qty,
price:price
});

updateCart();
document.getElementById("gotoCart").style.display="block";
}

function updateCart(){
let total=0;
for(let i=0;i<cart.length;i++){
total+=cart[i].price;
}
document.getElementById("count").innerText=cart.length;
document.getElementById("total").innerText=total;
}

function scrollCart(){
window.scrollTo({
top:document.body.scrollHeight,
behavior:'smooth'
});
}

function checkout(){

let name=document.getElementById("name").value.trim();
let phone=document.getElementById("phone").value.trim();
let address=document.getElementById("address").value.trim();

if(!name || !phone || !address){
alert("Please fill Name, Phone and Address");
return;
}

let total=0;
let items="";

for(let i=0;i<cart.length;i++){
total+=cart[i].price;
items+=cart[i].name+" ("+cart[i].size+") x"+cart[i].qty+", ";
}

if(total<499){
alert("Minimum order ₹499");
return;
}

let delivery = total>=899 ? 0 : 80;
let finalAmount = total + delivery;

/* Razorpay safe check */
if(typeof Razorpay === "undefined"){
alert("Payment system not loaded. Please refresh.");
return;
}

var options = {
key: "rzp_test_SkUDmNLwseMsIx",
amount: finalAmount * 100,
currency: "INR",
name: "Rathna Foods",
description: "Order Payment",
handler: function (response){

let msg="🛒 Order Confirmed%0A";
msg+="Name: "+name+"%0A";
msg+="Phone: "+phone+"%0A";
msg+="Address: "+address+"%0A";
msg+="Items: "+items+"%0A";
msg+="Paid: ₹"+finalAmount+"%0A";
msg+="Payment ID: "+response.razorpay_payment_id;

window.open("https://wa.me/918147924442?text="+msg);

}
};

var rzp = new Razorpay(options);
rzp.open();

}

/* Load products after page loads */
loadProducts();

</script>

</body>
</html>
