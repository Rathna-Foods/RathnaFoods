<script>
document.addEventListener("DOMContentLoaded", function(){

let products=[
["Puliyogare Powder",640,"images/puliyogare.jpg"],
["Sambar Powder",640,"images/sambar.jpg"],
["Rasam Powder",660,"images/rasam.jpg"]
];

let cart=[];

/* expose functions globally */
window.calc=function(b,s){
if(s=="100g")return b/10;
if(s=="200g")return b/5;
if(s=="500g")return b/2;
return b;
}

window.add=function(i){
let size=document.getElementById("s"+i).value;
let qty=parseInt(document.getElementById("q"+i).value);

if(!qty || qty<=0){
alert("Enter valid quantity");
return;
}

let price=calc(products[i][1],size)*qty;

cart.push({name:products[i][0],size,qty,price});
update();

document.getElementById("gotoCart").style.display="block";
}

function update(){
let total=0;
cart.forEach(c=>total+=c.price);
document.getElementById("count").innerText=cart.length;
document.getElementById("total").innerText=total;
}

window.scrollCart=function(){
window.scrollTo({top:document.body.scrollHeight,behavior:'smooth'});
}

window.checkout=function(){

let name=document.getElementById("name").value.trim();
let phone=document.getElementById("phone").value.trim();
let addr=document.getElementById("address").value.trim();

if(!name || !phone || !addr){
alert("Please fill all details");
return;
}

let total=0,items="";
cart.forEach(c=>{
total+=c.price;
items+=`${c.name} (${c.size}) x${c.qty}, `;
});

if(total<499){
alert("Minimum ₹499");
return;
}

let delivery=total>=899?0:80;
let final=total+delivery;

/* SAFE CHECK */
if(typeof Razorpay === "undefined"){
alert("Payment system not loaded. Please refresh.");
return;
}

var options = {
"key": "rzp_test_SkUDmNLwseMsIx",
"amount": final * 100,
"currency": "INR",
"name": "Rathna Foods",
"description": "Order Payment",

"handler": function (response){

let msg=`🛒 Order Confirmed%0A`;
msg+=`Name: ${name}%0A`;
msg+=`Phone: ${phone}%0A`;
msg+=`Address: ${addr}%0A`;
msg+=`Items: ${items}%0A`;
msg+=`Paid: ₹${final}%0A`;
msg+=`Payment ID: ${response.razorpay_payment_id}`;

window.open("https://wa.me/918147924442?text="+msg);

}
};

var rzp = new Razorpay(options);
rzp.open();
}

function load(){
let html="";
products.forEach((p,i)=>{
html+=`
<div class="card">
<img src="${p[2]}" onerror="this.src='images/default.jpg'">
<div class="card-body">
<h4>${p[0]}</h4>
<p>₹${p[1]}/kg</p>

<select id="s${i}">
<option>100g</option>
<option>200g</option>
<option>500g</option>
<option>1kg</option>
</select>

<input id="q${i}" type="number" value="1" min="1">

<button onclick="add(${i})">Add to Cart</button>
</div>
</div>`;
});
document.getElementById("products").innerHTML=html;
}

load();

});
</script>
