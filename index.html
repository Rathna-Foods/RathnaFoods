<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Rathna Foods</title>

<script src="https://checkout.razorpay.com/v1/checkout.js"></script>

<style>
body{margin:0;font-family:Poppins;background:#fffaf5}
header{padding:15px;background:#1f3d2b;color:white;text-align:center}
.section{padding:15px}
input,select{
width:100%;padding:10px;margin-top:10px;
border-radius:6px;border:1px solid #ccc;
}
.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:15px;margin-top:15px;
}
.card{
background:white;border-radius:10px;
box-shadow:0 4px 10px rgba(0,0,0,.1);
overflow:hidden;
}
.card img{
width:100%;height:150px;object-fit:cover;
}
.card-body{text-align:center;padding:10px}
button{
background:#8b0000;color:white;border:none;
padding:10px;width:100%;border-radius:6px;
margin-top:5px;cursor:pointer;
}
.cart{
position:fixed;bottom:0;width:100%;
background:black;color:white;text-align:center;padding:12px;
}
.goto{
position:fixed;bottom:70px;right:15px;
background:#e67e22;color:white;padding:10px 15px;
border-radius:30px;display:none;
}
</style>
</head>

<body>

<header>
<h2>Rathna Foods</h2>
<p>Pure Spice Pure Love ❤️</p>
</header>

<div class="section">

<h3>Customer Details</h3>
<input id="name" placeholder="Name">
<input id="phone" placeholder="Phone">
<input id="address" placeholder="Address">

<div class="grid" id="products"></div>

</div>

<div class="goto" id="gotoCart" onclick="scrollCart()">Go to Cart</div>

<div class="cart" onclick="checkout()">
🛒 <span id="count">0</span> | ₹<span id="total">0</span>
</div>

<script>
let products=[
["Puliyogare Powder",640,"images/puliyogare.jpg"],
["Sambar Powder",640,"images/sambar.jpg"],
["Rasam Powder",660,"images/rasam.jpg"],
["Gulkand",450,"images/gulkand.jpg"],
["Dry Fruits Gulkand",700,"images/drygulkand.jpg"]
];

let cart=[];

/* AUTO LOAD DETAILS */
window.onload=function(){
document.getElementById("name").value=localStorage.getItem("name")||"";
document.getElementById("phone").value=localStorage.getItem("phone")||"";
document.getElementById("address").value=localStorage.getItem("address")||"";
load();
}

/* SAVE DETAILS */
function saveDetails(){
localStorage.setItem("name",document.getElementById("name").value);
localStorage.setItem("phone",document.getElementById("phone").value);
localStorage.setItem("address",document.getElementById("address").value);
}

function calc(b,s){
if(s=="100g")return b/10;
if(s=="200g")return b/5;
if(s=="500g")return b/2;
return b;
}

function load(){
let html="";
products.forEach((p,i)=>{
html+=`
<div class="card">
<img src="${p[2]}" onerror="this.src='images/default.jpg'">
<div class="card-body">
<h4>${p[0]}</h4>
<p>₹${p[1]}/kg</p>

<select id="s${i}">
<option>100g</option>
<option>200g</option>
<option>500g</option>
<option>1kg</option>
</select>

<input id="q${i}" type="number" value="1" min="1">

<button onclick="add(${i})">Add to Cart</button>
</div>
</div>`;
});
document.getElementById("products").innerHTML=html;
}

function add(i){
let size=document.getElementById("s"+i).value;
let qty=parseInt(document.getElementById("q"+i).value);
let price=calc(products[i][1],size)*qty;

cart.push({name:products[i][0],size,qty,price});
update();

document.getElementById("gotoCart").style.display="block";
}

function update(){
let total=0;
cart.forEach(c=>total+=c.price);
document.getElementById("count").innerText=cart.length;
document.getElementById("total").innerText=total;
}

function scrollCart(){
window.scrollTo({top:document.body.scrollHeight,behavior:'smooth'});
}

function checkout(){

let name=document.getElementById("name").value.trim();
let phone=document.getElementById("phone").value.trim();
let addr=document.getElementById("address").value.trim();

if(!name||!phone||!addr){
alert("Please fill Name, Phone and Address");
return;
}

/* SAVE DATA */
saveDetails();

let total=0,items="";
cart.forEach(c=>{
total+=c.price;
items+=`${c.name} (${c.size}) x${c.qty}, `;
});

if(total<499){
alert("Minimum order ₹499");
return;
}

let delivery=total>=899?0:80;
let final=total+delivery;

/* RAZORPAY PAYMENT */
var options={
"key":"rzp_test_SkUDmNLwseMsIx",
"amount":final*100,
"currency":"INR",
"name":"Rathna Foods",
"description":"Order Payment",
"handler":function (response){

let msg=`🛒 Order Confirmed%0A`;
msg+=`Name: ${name}%0A`;
msg+=`Phone: ${phone}%0A`;
msg+=`Address: ${addr}%0A`;
msg+=`Items: ${items}%0A`;
msg+=`Paid: ₹${final}%0A`;
msg+=`Payment ID: ${response.razorpay_payment_id}`;

window.open("https://wa.me/918147924442?text="+msg);

},
"prefill":{
"name":name,
"contact":phone
}
};

var rzp=new Razorpay(options);
rzp.open();
}
</script>

</body>
</html>
